name: Code Quality

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Code formatting check
        continue-on-error: true
        run: |
          black --check --diff maple/

      - name: Import sorting check
        continue-on-error: true
        run: |
          isort --check-only --diff maple/

      - name: Lint check
        continue-on-error: true
        run: |
          flake8 maple/ --max-line-length=88 --extend-ignore=E203,W503,W291,W293,E302,E402,F401,F811,F841 --count --statistics

      - name: Type checking
        continue-on-error: true
        run: |
          mypy maple/ --ignore-missing-imports

      - name: Security check
        continue-on-error: true
        run: |
          bandit -r maple/ -ll -q

      - name: License header check
        run: |
          python -c "
          import os
          files_to_check = []
          for root, dirs, files in os.walk('maple'):
              for file in files:
                  if file.endswith('.py'):
                      files_to_check.append(os.path.join(root, file))

          missing_license = []
          for file in files_to_check:
              with open(file, 'r') as f:
                  content = f.read()
                  if 'Mahesh Vaijainthymala Krishnamoorthy' not in content:
                      missing_license.append(file)

          if missing_license:
              print(f'Files missing license header: {missing_license}')
              exit(1)
          else:
              print(f'All {len(files_to_check)} files have proper license headers')
          "

      - name: Documentation check
        run: |
          python -c "
          with open('README.md', 'r') as f:
              content = f.read()
              required = ['MAPLE', 'Installation', 'Quick Start', 'Mahesh Vaikri', 'AutonomousAgent']
              missing = [s for s in required if s not in content]
              if missing:
                  print(f'README missing sections: {missing}')
                  exit(1)
              else:
                  print('README has all required sections')
          "
