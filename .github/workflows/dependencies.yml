name: Dependency Updates

on:
  schedule:
    - cron: "0 0 * * MON" # Weekly on Mondays
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for outdated packages
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,security]"
          pip list --outdated --format=json > outdated.json || true
          python -c "
          import json
          with open('outdated.json') as f:
              outdated = json.load(f)
          if outdated:
              print(f'{len(outdated)} packages have updates available:')
              for pkg in outdated:
                  print(f\"  {pkg['name']}: {pkg['version']} -> {pkg['latest_version']}\")
          else:
              print('All packages are up to date')
          "

      - name: Check for security vulnerabilities
        run: |
          pip install pip-audit
          pip-audit || true

      - name: Run tests with current dependencies
        run: python -m pytest tests/ -v --tb=short -q
