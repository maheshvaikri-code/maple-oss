name: Performance Monitor

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Mondays

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,performance]"

      - name: Run performance benchmarks
        run: |
          python -c "
          import time
          import json
          from maple.core.message import Message
          from maple.core.result import Result

          # Message creation benchmark
          start_time = time.time()
          for i in range(100000):
              msg = Message('TEST', payload={'data': i})
          msg_time = time.time() - start_time
          msg_rate = 100000 / msg_time

          # Result operations benchmark
          start_time = time.time()
          for i in range(500000):
              result = Result.ok(i)
              value = result.unwrap()
          result_time = time.time() - start_time
          result_rate = 500000 / result_time

          metrics = {
              'message_creation_rate': msg_rate,
              'result_operations_rate': result_rate,
              'timestamp': time.time()
          }

          print(f'Message Creation: {msg_rate:,.0f} msg/sec')
          print(f'Result Operations: {result_rate:,.0f} ops/sec')

          with open('performance_metrics.json', 'w') as f:
              json.dump(metrics, f, indent=2)
          "

      - name: Performance regression check
        run: |
          python -c "
          import json

          with open('performance_metrics.json', 'r') as f:
              current = json.load(f)

          targets = {
              'message_creation_rate': 200000,
              'result_operations_rate': 500000,
          }

          passed = True
          for metric, target in targets.items():
              actual = current[metric]
              status = 'PASS' if actual >= target else 'FAIL'
              if actual < target:
                  passed = False
              print(f'{metric}: {actual:,.0f} (target: {target:,.0f}) [{status}]')

          if not passed:
              print('Performance regression detected')
              exit(1)
          print('All performance targets met')
          "

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics
          path: performance_metrics.json
